name: Outreach Workflow

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *' # Runs 3 times a day (e.g., 5:30 AM, 1:30 PM, 9:30 PM IST)

jobs:
  send-emails:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Optimization: Minimal jitter (1-10 mins) to save private repo minutes
      - name: Randomize Start Time
        run: |
          DELAY=$((1 + RANDOM % 10))
          echo "Waiting for $DELAY minutes to mimic human start time..."
          sleep $((DELAY * 60))

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Optimization: Fast Kotlin setup (Avoids slow snap install)
      - name: Install Kotlin
        run: |
          curl -sSL https://github.com/JetBrains/kotlin/releases/download/v1.9.22/kotlin-compiler-1.9.22.zip -o kotlin.zip
          unzip -q kotlin.zip
          echo "$(pwd)/kotlinc/bin" >> $GITHUB_PATH

      - name: Execute Script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          EMAIL_SUBJECT: ${{ secrets.EMAIL_SUBJECT }}
          EMAIL_BODY: ${{ secrets.EMAIL_BODY }}
        run: |
          kotlinc -script script/outreach.main.kts

      - name: Commit Progress
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/recipients.csv
          git commit -m "Update send status [skip ci]" || echo "No changes to commit"
          git push