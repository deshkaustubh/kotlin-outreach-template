name: AI Hackathon Outreach

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # 12 AM, 6 AM, 12 PM, 6 PM UTC

jobs:
  send-emails:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to save CSV progress

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Kotlin
        uses: fbeutel/setup-kotlin@v1
        with:
          kotlin-version: '1.9.20'

      - name: Execute Script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          EMAIL_SUBJECT: ${{ secrets.EMAIL_SUBJECT }}
          EMAIL_BODY: ${{ secrets.EMAIL_BODY }}
        run: |
          kotlinc -script outreach.main.kts

      - name: Commit Progress
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/recipients.csv || echo "No private CSV found"
          git add data/recipients.sample.csv || echo "No sample CSV found"
          git commit -m "Update send status [skip ci]" || echo "No changes to commit"
          git push